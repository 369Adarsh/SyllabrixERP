<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px; background:#FAF6EF;">
  <div style="display:grid; grid-template-columns: 1.5fr 1fr 1fr; gap:24px; align-items:center;">
    <div style="background:#FFFFFF; padding:18px 22px; border-radius:14px; box-shadow: 0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <img src="../assets/logo-syllabrix-network.png" alt="Syllabrix Network" style="height:60px; display:block;"/>
    </div>
    <div style="background:#192F3D; padding:18px; border-radius:14px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;">
      <img src="../assets/logo-mark.svg" alt="" style="width:48px; height:48px;"/>
      <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:22px; color:#F2F5F7; letter-spacing:-0.03em;">Syllabrix</div>
      <div style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:9px; letter-spacing:0.4em; color:#A2B3BE;">NETWORK</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="../assets/logo-mark.svg" style="width:40px; height:40px;"/>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#5C5849;">40 · sidebar</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="../assets/logo-mark.svg" style="width:24px; height:24px;"/>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#5C5849;">24 · top bar</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="../assets/logo-mark.svg" style="width:16px; height:16px;"/>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#5C5849;">16 · favicon</span>
      </div>
    </div>
  </div>
</body></html>
