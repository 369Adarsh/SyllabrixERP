<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:600; font-family:'Plus Jakarta Sans', sans-serif; }
  .dot { width:6px; height:6px; border-radius:999px; }
  .caps { text-transform:uppercase; letter-spacing:0.06em; font-size:10.5px; }
</style>
</head>
<body style="padding:24px 28px;">
  <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
    <span class="pill" style="background:#E6F6EF; color:#066341;"><span class="dot" style="background:#0E9F6E;"></span>Paid</span>
    <span class="pill" style="background:#FEF6E7; color:#8A3F07;"><span class="dot" style="background:#D97706;"></span>Pending</span>
    <span class="pill" style="background:#FCEAEA; color:#B91C1C;"><span class="dot" style="background:#DC2626;"></span>Overdue</span>
    <span class="pill" style="background:#ECEFF2; color:#122430;"><span class="dot" style="background:#192F3D;"></span>Draft</span>
    <span class="pill caps" style="background:#0A1825; color:#FAF6EF;">Live</span>
    <span class="pill caps" style="background:#1FB8D6; color:#0A1825;">New</span>
    <span class="pill" style="background:#F2EDE2; color:#3C3A30;">Branch 2 · Andheri</span>
    <span class="pill" style="background:#FFFFFF; color:#0A1825; border:1px solid #E8E2D6;">+ 3 more</span>
  </div>
</body></html>
