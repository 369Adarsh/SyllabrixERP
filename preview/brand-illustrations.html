<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:20px 24px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px;">
    <div style="background:#FFFFFF; border-radius:14px; padding:16px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06); display:flex; gap:12px; align-items:flex-start;">
      <img src="../assets/illustration-onboarding.svg" style="width:140px; height:auto; border-radius:10px;" />
      <div>
        <div class="label">Empty state</div>
        <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:18px; color:#0A1825; margin-top:6px;">Set up your shop</div>
        <div style="font-size:12px; color:#5C5849; margin-top:4px;">Tell us a few things about your business.</div>
      </div>
    </div>
    <div style="background:#0A1825; border-radius:14px; padding:16px; display:flex; gap:12px; align-items:flex-start;">
      <img src="../assets/illustration-ai-video.svg" style="width:140px; height:auto; border-radius:10px;" />
      <div>
        <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:#4FD3F2;">AI Studio</div>
        <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:18px; color:#FAF6EF; margin-top:6px;">Make a reel</div>
        <div style="font-size:12px; color:#B5B2A4; margin-top:4px;">From your products in 30 seconds.</div>
      </div>
    </div>
  </div>
</body></html>
