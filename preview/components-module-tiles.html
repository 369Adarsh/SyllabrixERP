<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="padding:24px 28px;">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px;">
    <div style="background:#FFFFFF; border-radius:14px; padding:16px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div style="width:36px; height:36px; border-radius:10px; background:#ECEFF2; color:#192F3D; display:flex; align-items:center; justify-content:center;"><i data-lucide="store"></i></div>
      <div style="font-weight:600; font-size:14px; color:#0A1825; margin-top:10px;">Point of Sale</div>
      <div style="font-size:12px; color:#5C5849;">Quick bills, receipts, returns.</div>
    </div>
    <div style="background:#FFFFFF; border-radius:14px; padding:16px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div style="width:36px; height:36px; border-radius:10px; background:#E6FAFF; color:#0EA1BD; display:flex; align-items:center; justify-content:center;"><i data-lucide="boxes"></i></div>
      <div style="font-weight:600; font-size:14px; color:#0A1825; margin-top:10px;">Inventory</div>
      <div style="font-size:12px; color:#5C5849;">Stock, barcodes, transfers.</div>
    </div>
    <div style="background:#FFFFFF; border-radius:14px; padding:16px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div style="width:36px; height:36px; border-radius:10px; background:#E6F6EF; color:#066341; display:flex; align-items:center; justify-content:center;"><i data-lucide="receipt-indian-rupee"></i></div>
      <div style="font-weight:600; font-size:14px; color:#0A1825; margin-top:10px;">Accounts</div>
      <div style="font-size:12px; color:#5C5849;">Ledger, P&amp;L, GST returns.</div>
    </div>
    <div style="background:#0A1825; border-radius:14px; padding:16px; color:#fff;">
      <div style="width:36px; height:36px; border-radius:10px; background:#1FB8D6; color:#0A1825; display:flex; align-items:center; justify-content:center;"><i data-lucide="sparkles"></i></div>
      <div style="font-weight:600; font-size:14px; margin-top:10px;">AI Marketing</div>
      <div style="font-size:12px; color:#B5B2A4;">Reels, posters, captions.</div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
