<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px;">
    <div style="background:#FFFFFF; border-radius:14px; padding:18px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div class="label">Today's sales</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:32px; line-height:1.1; color:#0A1825; margin-top:6px; font-variant-numeric: tabular-nums;">₹1,24,560</div>
      <div style="font-size:12px; color:#0E9F6E; font-weight:600; margin-top:4px;">▲ 18% vs yesterday</div>
    </div>
    <div style="background:#FFFFFF; border-radius:14px; padding:18px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div class="label">Bills today</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:32px; line-height:1.1; color:#0A1825; margin-top:6px; font-variant-numeric: tabular-nums;">86</div>
      <div style="font-size:12px; color:#5C5849; margin-top:4px;">avg ₹1,449</div>
    </div>
    <div style="background:linear-gradient(135deg, #192F3D, #0C1A23); border-radius:14px; padding:18px; color:#fff; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div class="label" style="color:#9DACB8;">Low stock</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:32px; line-height:1.1; margin-top:6px; font-variant-numeric: tabular-nums;">12 <span style="font-size:14px; opacity:0.75; font-weight:500;">items</span></div>
      <div style="font-size:12px; color:#4FD3F2; font-weight:600; margin-top:4px;">Needs reorder →</div>
    </div>
  </div>
</body></html>
