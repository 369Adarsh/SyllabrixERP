<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">

<body style="padding:18px 24px;">
  <div style="display:grid; grid-template-columns:repeat(8,1fr); gap:14px; align-items:center;">

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="users" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">customers</span></div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="megaphone" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">marketing</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="sparkles" style="color:#1FB8D6; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">ai studio</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="receipt-indian-rupee" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">invoices</span></div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="stethoscope" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">clinic</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="scissors" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">salon</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="utensils" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">restaurant</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="bar-chart-3" style="color:#192F3D; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">reports</span></div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="bot" style="color:#1FB8D6; width:22px; height:22px;"></i><span style="font-size:10px; color:#5C5849;">copilot</span></div>

  <script>lucide.createIcons();</script>
