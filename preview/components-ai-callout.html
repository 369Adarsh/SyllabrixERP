<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="padding:18px 24px;">
  <div style="display:flex; gap:14px; align-items:center;">
    <div style="background:#0A1825; color:#FAF6EF; border-radius:14px; padding:12px 16px; box-shadow:0 24px 56px -12px rgba(15,16,32,0.18); display:flex; gap:12px; align-items:flex-start; max-width:380px;">
      <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg, #192F3D, #1FB8D6); display:flex; align-items:center; justify-content:center; flex:0 0 auto;"><i data-lucide="sparkles" style="color:#fff; width:18px; height:18px;"></i></div>
      <div>
        <div style="font-weight:600; font-size:13px;">Sales dropped 12% this week.</div>
        <div style="font-size:12px; color:#B5B2A4; margin-top:4px;">Mostly Branch 2. Want a breakdown, or shall I draft a re-engagement campaign?</div>
        <div style="display:flex; gap:6px; margin-top:8px;">
          <button style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:12px; padding:6px 10px; border-radius:8px; background:#1FB8D6; color:#0A1825; border:0;">Show me</button>
          <button style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:12px; padding:6px 10px; border-radius:8px; background:transparent; color:#FAF6EF; border:1px solid #1A3A4D;">Later</button>
        </div>
      </div>
    </div>
    <div style="flex:1;">
      <div class="label">AI Copilot · sample callout</div>
      <div style="font-size:12px; color:#5C5849; margin-top:6px; line-height:1.5;">Concise · evidence-based · proposes a next action. Saffron CTA, never a wall of text.</div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
