<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px;">
    <div style="background:#FFFFFF; border-radius:12px; padding:14px; border:1px solid #E8E2D6;">
      <div class="label" style="color:#5C5849;">Default</div>
      <div style="font-size:13px; margin-top:10px; color:#0A1825;">Hairline border. No shadow. Used inside scroll regions.</div>
    </div>
    <div style="background:#FFFFFF; border-radius:12px; padding:14px; box-shadow:0 1px 1px rgba(15,16,32,0.04), 0 2px 6px -1px rgba(15,16,32,0.06);">
      <div class="label" style="color:#5C5849;">Resting</div>
      <div style="font-size:13px; margin-top:10px; color:#0A1825;">Soft shadow. The default dashboard card.</div>
    </div>
    <div style="background:#FFFFFF; border-radius:12px; padding:14px; box-shadow:0 1px 1px rgba(15,16,32,0.05), 0 8px 20px -4px rgba(15,16,32,0.10); transform: translateY(-2px); border: 1px solid #CFD7DD;">
      <div class="label" style="color:#122430;">Hover</div>
      <div style="font-size:13px; margin-top:10px; color:#0A1825;">Lifts 2px. Shadow deepens. Indigo-tinted ring on focus.</div>
    </div>
  </div>
</body></html>
