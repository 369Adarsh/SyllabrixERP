<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px;">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">
    <div style="border-radius:12px; padding:14px; background:#E6F6EF; border:1px solid #BFE8D5;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background:#0E9F6E;"></span>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#066341;">Success</span>
      </div>
      <div style="font-size:13px; color:#066341; margin-top:6px; font-family:'JetBrains Mono',monospace;">#0E9F6E</div>
    </div>
    <div style="border-radius:12px; padding:14px; background:#FEF6E7; border:1px solid #FCE7B6;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background:#D97706;"></span>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#8A3F07;">Warning</span>
      </div>
      <div style="font-size:13px; color:#8A3F07; margin-top:6px; font-family:'JetBrains Mono',monospace;">#D97706</div>
    </div>
    <div style="border-radius:12px; padding:14px; background:#FCEAEA; border:1px solid #F5BFBF;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background:#DC2626;"></span>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#B91C1C;">Danger</span>
      </div>
      <div style="font-size:13px; color:#B91C1C; margin-top:6px; font-family:'JetBrains Mono',monospace;">#DC2626</div>
    </div>
    <div style="border-radius:12px; padding:14px; background:#ECEFF2; border:1px solid #CFD7DD;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background:#192F3D;"></span>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#122430;">Info</span>
      </div>
      <div style="font-size:13px; color:#122430; margin-top:6px; font-family:'JetBrains Mono',monospace;">#192F3D</div>
    </div>
  </div>
</body></html>
